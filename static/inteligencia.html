<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egreja — Inteligência Unificada</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-dim:#7A5C1A;--profit:#22C55E;--loss:#EF4444;--accent:#60A5FA;--purple:#A78BFA;--cyan:#22D3EE;--orange:#FB923C;--pink:#EC4899;--red:#F43F5E;--s1:#060A10;--s2:#0B1018;--s3:#111820;--border:#1A2332;--muted:#374151;--text:#E2E8F0;--dim:#64748B;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--s1);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Core Principles Banner */
.principles-banner{background:rgba(167,139,250,.08);border-bottom:1px solid rgba(167,139,250,.15);padding:8px 24px;font-size:8px;font-weight:600;letter-spacing:.08em;color:rgba(167,139,250,.7);text-align:center;font-family:var(--mono)}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(6,10,16,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.header p{font-size:11px;color:var(--dim);margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px}
.brain-icon{display:inline-block;width:20px;height:20px;background:linear-gradient(135deg,var(--purple),#C084FC);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--s3)}
.btn-active{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-active:hover{background:#9F7AEA}
.container{max-width:1600px;margin:0 auto;padding:24px}

/* Grids */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1024px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.2),transparent)}
.card-header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:16px}
.stat-card{padding:16px;display:flex;flex-direction:column;gap:8px;border-top:2px solid rgba(167,139,250,.2)}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.stat-value{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--dim)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--s3);border-radius:8px;padding:4px;overflow-x:auto;margin-bottom:24px;border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;background:transparent;color:var(--dim);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--purple);color:#fff;box-shadow:0 1px 3px rgba(167,139,250,.3)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.badge-arbi{background:rgba(34,211,238,.1);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}
.badge-crypto{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.badge-stocks{background:rgba(34,197,94,.1);color:var(--profit);border:1px solid rgba(34,197,94,.2)}
.badge-deriv{background:rgba(96,165,250,.1);color:var(--accent);border:1px solid rgba(96,165,250,.2)}
.badge-lh{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.badge-info{background:rgba(96,165,250,.1);color:var(--accent);border:1px solid rgba(96,165,250,.2)}
.badge-healthy{background:rgba(34,197,94,.1);color:var(--profit);border:1px solid rgba(34,197,94,.2)}
.badge-degraded{background:rgba(239,68,68,.1);color:var(--loss);border:1px solid rgba(239,68,68,.2)}

/* Health Banner */
.health-banner{padding:12px 16px;border-radius:8px;display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:13px;font-weight:600;border:1px solid;background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(96,165,250,.05));border-color:rgba(167,139,250,.2);color:var(--purple)}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--dim);font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid rgba(26,35,50,.4)}
tr:hover{background:rgba(17,24,32,.5)}
.text-right{text-align:right}
.text-mono{font-family:var(--mono)}
.text-profit{color:var(--profit)}
.text-loss{color:var(--loss)}
.text-dim{color:var(--dim)}
.text-accent{color:var(--accent)}
.text-purple{color:var(--purple)}

/* Progress bar */
.progress-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* Module cards */
.module-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;border-left:3px solid var(--purple)}
.module-card.arbi{border-left-color:var(--cyan)}
.module-card.crypto{border-left-color:var(--orange)}
.module-card.stocks{border-left-color:var(--profit)}
.module-card.deriv{border-left-color:var(--accent)}
.module-card.lh{border-left-color:var(--gold)}
.module-header{display:flex;align-items:center;justify-content:space-between}
.module-title{font-size:13px;font-weight:700}
.module-status{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.module-status.active{background:var(--profit);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.module-meta{display:flex;justify-content:space-between;gap:12px;font-size:11px}
.module-meta-item{display:flex;flex-direction:column;gap:2px}
.module-meta-label{color:var(--dim)}

/* Decision cards */
.decision-card{background:var(--s2);border:1px solid var(--purple);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;border-left:4px solid var(--purple)}
.decision-header{display:flex;align-items:center;gap:8px;justify-content:space-between}
.decision-type{padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono)}
.decision-type.buy{background:rgba(34,197,94,.2);color:var(--profit)}
.decision-type.alert{background:rgba(239,68,68,.2);color:var(--loss)}
.decision-type.shift{background:rgba(167,139,250,.2);color:var(--purple)}
.decision-type.urgent{background:rgba(239,68,68,.2);color:var(--loss)}
.decision-type.normal{background:rgba(96,165,250,.2);color:var(--accent)}
.decision-text{font-size:12px;line-height:1.5;color:var(--text)}
.decision-factors{display:flex;flex-direction:column;gap:6px}
.decision-factor{font-size:11px;display:flex;align-items:center;gap:6px;color:var(--dim)}
.decision-factor.positive{color:var(--profit)}
.decision-factor.negative{color:var(--loss)}

/* Pattern cards */
.pattern-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px}
.pattern-name{font-size:13px;font-weight:700}
.pattern-desc{font-size:11px;color:var(--dim);line-height:1.4}
.pattern-modules{display:flex;gap:6px;flex-wrap:wrap}
.pattern-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.pattern-metric{display:flex;flex-direction:column;gap:4px}
.pattern-metric-label{font-size:10px;color:var(--dim);text-transform:uppercase}
.pattern-metric-value{font-size:14px;font-weight:700;font-family:var(--mono)}

/* Correlation matrix */
.correlation-cell{padding:8px;text-align:center;font-size:11px;font-weight:600;font-family:var(--mono);border:1px solid var(--border)}
.correlation-cell.strong-pos{background:rgba(34,197,94,.4);color:#fff}
.correlation-cell.moderate-pos{background:rgba(34,197,94,.2);color:var(--profit)}
.correlation-cell.neutral{background:rgba(100,116,139,.1);color:var(--dim)}
.correlation-cell.moderate-neg{background:rgba(239,68,68,.2);color:var(--loss)}
.correlation-cell.strong-neg{background:rgba(239,68,68,.4);color:#fff}
.correlation-header{background:var(--s3);padding:8px;text-align:center;font-size:10px;font-weight:700;border:1px solid var(--border)}

/* Regime card */
.regime-card{background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(96,165,250,.05));border:1px solid rgba(167,139,250,.2);border-radius:8px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:16px}
.regime-name{font-size:28px;font-weight:700;font-family:var(--mono);letter-spacing:.05em}
.regime-confidence{font-size:14px;color:var(--dim)}
.regime-duration{font-size:12px;color:var(--dim);margin-top:4px}
.regime-timeline{display:flex;gap:4px;margin-top:12px}
.regime-block{flex:1;height:20px;border-radius:4px;cursor:pointer;position:relative}
.regime-block:hover::after{content:attr(data-label);position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);background:var(--s2);padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;border:1px solid var(--border)}

/* Risk radar */
.risk-gauge{width:150px;height:150px;border-radius:50%;background:conic-gradient(to right,var(--profit),var(--orange),var(--loss));display:flex;align-items:center;justify-content:center;position:relative;margin:0 auto}
.risk-gauge-inner{width:140px;height:140px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-direction:column}
.risk-score{font-size:32px;font-weight:700;font-family:var(--mono)}
.risk-label{font-size:10px;color:var(--dim);margin-top:4px;text-transform:uppercase}

/* Evolution chart */
.evolution-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.evolution-label{min-width:60px;font-size:11px;font-weight:600}
.evolution-bar-container{flex:1;height:32px;background:var(--s3);border-radius:4px;overflow:hidden;position:relative;display:flex;align-items:center}
.evolution-bar-fill{height:100%;background:linear-gradient(90deg,var(--loss),var(--orange),var(--profit));border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff}
.evolution-value{font-size:11px;font-weight:700;font-family:var(--mono);min-width:40px;text-align:right}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}

/* Section */
.section{margin-bottom:24px}

.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Module colors */
.arbi-color{color:var(--cyan)}
.crypto-color{color:var(--orange)}
.stocks-color{color:var(--profit)}
.deriv-color{color:var(--accent)}
.lh-color{color:var(--gold)}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Core Principles Banner -->
<div class="principles-banner">
🧠 PRINCÍPIO FUNDAMENTAL: Nunca inventar dados. Nunca mentir. Toda informação deve ser verificável. Todos os módulos conectados. Aprendizado contínuo.
</div>

<!-- Header -->
<div class="header" style="flex-wrap:wrap;gap:12px">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:linear-gradient(135deg,#C9A84C,#7A5C1A);color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;letter-spacing:.02em;box-shadow:0 2px 8px rgba(201,168,76,.3);transition:all .2s" title="Voltar ao Dashboard Principal">
      <span style="font-size:18px">←</span> Dashboard Principal
    </a>
    <img src="/logo.png" alt="Egreja IA" style="height:34px;width:auto">
    <div>
      <h1><span class="brain-icon">🧠</span> Inteligência Egreja</h1>
      <p id="header-subtitle">Motor Unificado · Arbi · Crypto · Stocks · Derivativos · Long Horizon</p>
    </div>
  </div>
  <div class="header-right">
    <span id="brain-badge" class="text-mono" style="font-size:12px;font-weight:700;color:var(--purple)">🧠 Score: —</span>
    <span id="market-clock" class="text-mono" style="font-size:11px;color:var(--dim)"></span>
    <span class="text-mono" style="font-size:11px;color:var(--dim)" id="last-refresh">—</span>
    <button class="btn" onclick="refresh()" id="refresh-btn">🔄 Atualizar</button>
    <button class="btn btn-active" onclick="toggleAuto()" id="auto-btn">⚡ Auto ON</button>
  </div>
</div>

<div class="container">
  <!-- Health Banner -->
  <div id="health-banner"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-bar"></div>

  <!-- Tab Content -->
  <div id="tab-content"></div>
</div>

<script>
const RW = 'https://diligent-spirit-production.up.railway.app';
const BRAIN_API = RW + '/brain';

const MODULES = {
  ARBI: { label:'Arbitragem', color:'var(--cyan)', icon:'🔄' },
  CRYPTO: { label:'Crypto', color:'var(--orange)', icon:'₿' },
  STOCKS: { label:'Stocks', color:'var(--profit)', icon:'📈' },
  DERIV: { label:'Derivativos', color:'var(--accent)', icon:'📊' },
  LH: { label:'Long Horizon', color:'var(--gold)', icon:'🚀' },
};

const REGIME_COLORS = {
  BULL: 'var(--profit)',
  BEAR: 'var(--loss)',
  SIDEWAYS: 'var(--orange)',
  VOLATILE: 'var(--purple)',
  CRISIS: '#8B0000',
  WEEKEND_STANDBY: 'var(--dim)',
};

let state = {
  systemState: null, lessons: [], patterns: [], correlations: null,
  regime: null, decisions: [], evolution: null, riskRadar: null,
  health: null, activeTab: 'overview', autoRefresh: true, loading: false
};
let autoInterval = null;

// ─── Data Fetching ──────────────────────────────────────────────
async function fetchAll() {
  state.loading = true;
  renderRefreshBtn();
  try {
    const results = await Promise.allSettled([
      fetch(`${BRAIN_API}/system-state`).then(r=>r.json()).catch(()=>({})),
      fetch(`${BRAIN_API}/lessons`).then(r=>r.json()).catch(()=>({lessons:[]})),
      fetch(`${BRAIN_API}/patterns`).then(r=>r.json()).catch(()=>({patterns:[]})),
      // [v2] /correlations removido — seção nunca funcionou direito
      fetch(`${BRAIN_API}/regime`).then(r=>r.json()).catch(()=>({regime:'UNKNOWN'})),
      fetch(`${BRAIN_API}/decisions`).then(r=>r.json()).catch(()=>({decisions:[]})),
      fetch(`${BRAIN_API}/evolution`).then(r=>r.json()).catch(()=>({evolution:{}})),
      fetch(`${BRAIN_API}/risk-radar`).then(r=>r.json()).catch(()=>({risk_score:0})),
      fetch(`${BRAIN_API}/health`).then(r=>r.json()).catch(()=>({modules:{}})),
    ]);

    const [ss, les, pat, corr, reg, dec, evo, risk, hel] = results;

    if(ss.status==='fulfilled' && ss.value) state.systemState = ss.value;
    if(les.status==='fulfilled' && les.value) state.lessons = les.value.lessons || [];
    if(pat.status==='fulfilled' && pat.value) state.patterns = pat.value.patterns || [];
    if(reg.status==='fulfilled' && reg.value) state.regime = reg.value.regime || 'UNKNOWN';
    if(dec.status==='fulfilled' && dec.value) state.decisions = dec.value.decisions || [];
    if(evo.status==='fulfilled' && evo.value) state.evolution = evo.value;
    if(risk.status==='fulfilled' && risk.value) state.riskRadar = risk.value;
    if(hel.status==='fulfilled' && hel.value) state.health = hel.value.modules || {};

    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('pt-BR');
  } catch(e) { console.error('Fetch error:', e); }
  state.loading = false;
  render();
}

function toggleAuto() {
  state.autoRefresh = !state.autoRefresh;
  const btn = document.getElementById('auto-btn');
  if(state.autoRefresh) {
    btn.className='btn btn-active'; btn.textContent='⚡ Auto ON';
    autoInterval = setInterval(fetchAll, 30000);
  } else {
    btn.className='btn'; btn.textContent='⚡ Auto OFF';
    clearInterval(autoInterval);
  }
}
function refresh() { fetchAll(); }
function renderRefreshBtn() {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = state.loading ? '<span class="spin">🔄</span> ...' : '🔄 Atualizar';
}

// ─── Helpers ────────────────────────────────────────────────────
function fmtNum(v, digits=2) {
  if(v === null || v === undefined) return '—';
  return parseFloat(v).toFixed(digits);
}

function fmtPct(v) {
  if(v === null || v === undefined) return '—';
  return (parseFloat(v)*100).toFixed(1)+'%';
}

function getModuleColor(module) {
  const m = MODULES[module] || {};
  return m.color || 'var(--dim)';
}

function getModuleBadge(module) {
  const m = MODULES[module] || {};
  const badgeClass = {
    'ARBI':'badge-arbi','CRYPTO':'badge-crypto','STOCKS':'badge-stocks',
    'DERIV':'badge-deriv','LH':'badge-lh'
  }[module] || 'badge-info';
  return `<span class="badge ${badgeClass}">${m.icon || '◆'} ${m.label}</span>`;
}

// ─── Rendering ──────────────────────────────────────────────────
function render() {
  renderHeaderSubtitle();
  renderMarketClock();
  renderBrainBadge();
  renderHealthBanner();
  renderTabs();
  renderTabContent();
}

function renderHeaderSubtitle() {
  const el = document.getElementById('header-subtitle');
  const ss = state.systemState;
  if(!ss) { el.textContent = 'Motor Unificado · Inicializando...'; return; }
  const lessonCount = state.lessons.length;
  const patternCount = state.patterns.length;
  el.textContent = `Motor Unificado · ${lessonCount} Lições · ${patternCount} Padrões`;
}

function renderMarketClock() {
  const el = document.getElementById('market-clock');
  const now = new Date();
  const brtTime = now.toLocaleTimeString('pt-BR', {timeZone:'America/Sao_Paulo'});
  el.textContent = `🕐 BRT ${brtTime}`;
}

function renderBrainBadge() {
  const el = document.getElementById('brain-badge');
  const score = state.systemState?.brain_evolution_score || 0;
  const scoreStr = fmtNum(score, 1);
  el.textContent = `🧠 Score: ${scoreStr}`;
}

function renderHealthBanner() {
  const el = document.getElementById('health-banner');
  const ss = state.systemState;
  const regimeStr = state.regime || 'CARREGANDO';
  const lessonCount = state.lessons.length;
  const patternCount = state.patterns.length;
  const decisionCount = state.decisions.length;

  el.innerHTML = `<div class="health-banner">
    <span style="font-size:16px">🧠</span>
    <div style="flex:1;text-align:left">
      <div style="font-weight:700">Motor de Inteligência Ativo</div>
      <div style="font-size:11px;margin-top:2px">${lessonCount} lições aprendidas · ${patternCount} padrões ativos · ${decisionCount} decisões geradas · Regime: ${regimeStr}</div>
    </div>
  </div>`;
}

function renderTabs() {
  const el = document.getElementById('tabs-bar');
  const allTabs = [
    { key:'overview', label:'Visão Geral' },
    { key:'proposals', label:'Propostas 🌙' },
    { key:'learning', label:'Aprendizado' },
    { key:'patterns', label:'Padrões' },
    { key:'regime', label:'Regime' },
    { key:'scorev3', label:'Sistema V3' },
    { key:'decisions', label:'Decisões' },
    { key:'evolution', label:'Evolução' },
    { key:'risk', label:'Risco' },
  ];

  let html = '';
  for(const t of allTabs) {
    const active = state.activeTab === t.key ? 'active' : '';
    html += `<button class="tab ${active}" onclick="switchTab('${t.key}')">${t.label}</button>`;
  }
  el.innerHTML = html;
}

function switchTab(tab) { state.activeTab = tab; renderTabs(); renderTabContent(); }

function renderTabContent() {
  const el = document.getElementById('tab-content');
  switch(state.activeTab) {
    case 'overview': el.innerHTML = renderOverview(); break;
    case 'proposals': renderProposals(el); break;
    case 'learning': el.innerHTML = renderLearning(); break;
    case 'patterns': el.innerHTML = renderPatterns(); break;
    case 'regime': el.innerHTML = renderRegime(); break;
    case 'scorev3': el.innerHTML = renderScoreV3(); break;
    case 'decisions': el.innerHTML = renderDecisions(); break;
    case 'evolution': el.innerHTML = renderEvolution(); break;
    case 'risk': el.innerHTML = renderRisk(); break;
    default: el.innerHTML = renderOverview(); break;
  }
}

// ─── Overview Tab ───────────────────────────────────────────────
function renderOverview() {
  let html = '';

  // Brain Status Banner
  const score = state.systemState?.brain_evolution_score || 0;
  const regime = state.regime || 'DESCONHECIDO';
  const lessonCount = state.lessons.length;
  html += `<div class="card section" style="background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(96,165,250,.05));border:1px solid rgba(167,139,250,.2)">
    <div class="card-body" style="text-align:center;padding:24px">

function renderLearning() {
  if(state.lessons.length === 0) {
    return '<div class="empty-state">Processando inteligência...</div>';

  let html = '<div class="section"><div style="margin-bottom:12px"><select id="module-filter" onchange="filterLessons(this.value)" style="padding:6px 12px;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;cursor:pointer">';
  html += '<option value="">Todos os Módulos</option>';
  for(const [key, mod] of Object.entries(MODULES)) {
    html += `<option value="${key}">${mod.label}</option>`;
  }
  html += '</select></div>';

  html += `<table>
    <thead>
      <tr>
        <th>#</th>
        <th>Módulo</th>
        <th>Tipo</th>
        <th>Lição</th>
        <th>Impacto</th>
        <th>Confiança</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody>`;

  state.lessons.forEach((l, i) => {
    const impactColor = l.impact > 7 ? 'var(--loss)' : l.impact > 4 ? 'var(--orange)' : 'var(--profit)';
    const confStr = fmtNum(l.confidence * 100, 0) + '%';
    html += `<tr>
      <td>${i + 1}</td>
      <td>${getModuleBadge(l.module)}</td>
      <td>${l.type || '—'}</td>
      <td style="max-width:300px;text-overflow:ellipsis;overflow:hidden">${l.description || '—'}</td>
      <td><span style="color:${impactColor};font-weight:700">${l.impact || '—'}</span>/10</td>
      <td><span style="color:var(--accent);font-weight:700">${confStr}</span></td>
      <td class="text-mono">${l.date ? new Date(l.date).toLocaleDateString('pt-BR') : '—'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

function filterLessons(module) {
  if(module === '') {
    state.lessons.sort((a,b)=>new Date(b.date)-new Date(a.date));
  } else {
    state.lessons = state.lessons.filter(l=>l.module === module);
  }
  renderTabContent();
}

// ─── Correlations Tab ────────────────────────────────────────────
function renderCorrelations() {
  if(!state.correlations || state.correlations.length === 0) {
    return '<div class="empty-state">Processando inteligência...</div>';
  }

  let html = '<div class="section">';

  // Create correlation matrix
  const assets = [...new Set(state.correlations.flatMap(c=>[c.asset1, c.asset2]))];
  const matrix = {};
  for(const a of assets) matrix[a] = {};
  for(const a1 of assets) for(const a2 of assets) {
    if(a1 === a2) matrix[a1][a2] = 1;
    else {
      const corr = state.correlations.find(c=>(c.asset1===a1 && c.asset2===a2) || (c.asset1===a2 && c.asset2===a1));
      matrix[a1][a2] = corr ? corr.coefficient : 0;
    }
  }

  html += '<table style="border-collapse:collapse;margin-bottom:24px"><tr><th class="correlation-header"></th>';
  for(const a of assets) html += `<th class="correlation-header">${a}</th>`;
  html += '</tr>';

  for(const a1 of assets) {
    html += `<tr><th class="correlation-header">${a1}</th>`;
    for(const a2 of assets) {
      const coeff = matrix[a1][a2];
      let cellClass = 'neutral';
      if(coeff > 0.5) cellClass = 'strong-pos';
      else if(coeff > 0.2) cellClass = 'moderate-pos';
      else if(coeff < -0.5) cellClass = 'strong-neg';
      else if(coeff < -0.2) cellClass = 'moderate-neg';
      html += `<td class="correlation-cell ${cellClass}">${fmtNum(coeff, 2)}</td>`;
    }
    html += '</tr>';
  }
  html += '</table>';

  // Key correlations
  html += '<div style="font-size:13px;font-weight:700;margin-bottom:12px">Correlações Principais</div>';
  const sorted = [...state.correlations].sort((a,b)=>Math.abs(b.coefficient)-Math.abs(a.coefficient)).slice(0,5);
  for(const corr of sorted) {
    const strength = Math.abs(corr.coefficient) > 0.7 ? 'Forte' : Math.abs(corr.coefficient) > 0.4 ? 'Moderada' : 'Fraca';
    const color = corr.coefficient > 0 ? 'var(--profit)' : 'var(--loss)';
    html += `<div style="padding:8px;background:var(--s3);border-radius:4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <span>${corr.asset1} ↔ ${corr.asset2}</span>
      <span style="color:${color};font-weight:700;font-family:var(--mono)">${fmtNum(corr.coefficient, 3)} (${strength})</span>
    </div>`;
  }

  html += '</div>';
  return html;
}

        <tr><td style="padding:6px 8px;color:var(--dim,#64748B)">e0b1dab</td><td style="padding:6px 8px">v10.50</td><td style="padding:6px 8px;color:#e74c3c">CRÍTICO: candles Binance 1d → 1h</td></tr>
        <tr><td style="padding:6px 8px;color:var(--dim,#64748B)">a77a92e</td><td style="padding:6px 8px">v10.51</td><td style="padding:6px 8px">Concentração usa portfolio TOTAL</td></tr>
      </tbody>
    </table></div></div>`;

  html += '</div>';
  return html;
}

// ─── Regime Tab ──────────────────────────────────────────────────
function renderRegime() {
  const regime = state.regime || 'DESCONHECIDO';
  const regimeColor = REGIME_COLORS[regime] || 'var(--dim)';
  const ss = state.systemState || {};
  const confidence = ss.regime_confidence || 0;
  const duration = ss.regime_duration || '—';

  let html = `<div class="section">
    <div class="regime-card" style="border-color:${regimeColor};background:linear-gradient(135deg,rgba(167,139,250,.05),transparent)">
      <div class="regime-name" style="color:${regimeColor}">${regime}</div>
      <div class="regime-confidence">Confiança: ${fmtNum(confidence*100, 0)}%</div>
      <div class="regime-duration">Duração: ${duration}</div>
    </div>
  </div>`;

  // Regime Timeline (last 6 months as colored blocks)
  const timeline = ss.regime_timeline || [];
  if(timeline.length > 0) {
    html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Timeline de Regimes (6 Meses)</div><div class="regime-timeline">';
    for(const block of timeline) {
      const color = REGIME_COLORS[block.regime] || 'var(--dim)';
      html += `<div class="regime-block" style="background:${color};opacity:0.7" data-label="${block.regime}"></div>`;
    }
    html += '</div></div>';
  }

  // Module indicators
  html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Indicadores por Módulo</div><div class="grid-2">';
  for(const [key, module] of Object.entries(MODULES)) {
    const indicator = ss.module_regime_indicators?.[key] || '—';
    html += `<div style="padding:12px;background:var(--s2);border-radius:6px;border-left:3px solid ${module.color}">
      <div style="font-size:11px;color:var(--dim);font-weight:600">${module.label}</div>
      <div style="font-size:13px;font-weight:700;margin-top:4px">${indicator}</div>
    </div>`;
  }
  html += '</div></div>';

  return html;
}

// ─── Decisions Tab ───────────────────────────────────────────────
function renderDecisions() {
  if(state.decisions.length === 0) {
    return '<div class="empty-state">Processando inteligência...</div>';
  }

  let html = '<div class="section">';
  for(const dec of state.decisions) {
    const typeClass = dec.decision_type?.toLowerCase().includes('buy') ? 'buy'
      : dec.decision_type?.toLowerCase().includes('alert') ? 'alert'
      : dec.decision_type?.toLowerCase().includes('shift') ? 'shift'
      : 'normal';
    const urgency = dec.urgency || 'NORMAL';
    const urgencyClass = urgency === 'URGENT' ? 'urgent' : 'normal';
    const confidencePct = fmtNum(dec.confidence || 0, 0) + '%';

    html += `<div class="decision-card">
      <div class="decision-header">
        <div style="display:flex;gap:6px">
          <div class="decision-type ${typeClass}">${dec.decision_type || 'NORMAL'}</div>
          <div class="decision-type ${urgencyClass}" style="font-size:9px">${urgency}</div>
        </div>
        <div style="font-size:10px;color:var(--dim)">${dec.timestamp || '—'}</div>
      </div>
      <div class="decision-text">${dec.recommendation || 'Sem recomendação'}</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-top:8px">
        <span>Confiança:</span>
        <div class="progress-bar" style="flex:1">
          <div class="progress-fill" style="width:${dec.confidence || 0}%;background:var(--accent)"></div>
        </div>
        <span class="text-mono">${confidencePct}</span>
      </div>
      ${dec.modules && dec.modules.length > 0 ? `<div style="margin-top:8px">${dec.modules.map(m=>getModuleBadge(m)).join('')}</div>` : ''}
      ${dec.supporting_factors && dec.supporting_factors.length > 0 ? `<div class="decision-factors" style="margin-top:8px">
        <div style="font-size:10px;color:var(--dim);font-weight:600;margin-bottom:4px">Fatores:</div>
        ${dec.supporting_factors.map(f=>`<div class="decision-factor positive">✓ ${f}</div>`).join('')}
      </div>` : ''}
      ${dec.risk_assessment ? `<div style="margin-top:8px;padding:8px;background:rgba(239,68,68,.05);border-radius:4px;border-left:2px solid var(--loss);font-size:11px">
        <div style="color:var(--loss);font-weight:600">Avaliação de Risco:</div>
        <div style="color:var(--dim);margin-top:2px">${dec.risk_assessment}</div>
      </div>` : ''}
    </div>`;
  }
  html += '</div>';
  return html;
}

// ─── Evolution Tab ───────────────────────────────────────────────
function renderEvolution() {
  const evo = state.evolution || {};
  const months = evo.monthly_scores || [];

  let html = '<div class="section">';

  // Evolution chart
  if(months.length > 0) {
    html += '<div style="font-size:13px;font-weight:700;margin-bottom:16px">Score de Evolução (6 Meses)</div>';
    for(const m of months.slice(-6)) {
      const score = m.score || 0;
      const pct = Math.min(100, score);
      html += `<div class="evolution-bar">
        <div class="evolution-label">${m.month}</div>
        <div class="evolution-bar-container">
          <div class="evolution-bar-fill" style="width:${pct}%">${fmtNum(score, 1)}</div>
        </div>
      </div>`;
    }
  }

  html += '</div><div class="section"><div class="grid-3">';

  // Metrics
  const totalLessons = evo.total_lessons_growth || 0;
  const accuracyImprovement = evo.accuracy_improvement || 0;
  const patternsDiscovered = evo.patterns_discovered || 0;

  html += `
    ${statCard('Crescimento de Lições', totalLessons + '+', 'Novas experiências', 'var(--gold)')}
    ${statCard('Melhoria de Acurácia', fmtNum(accuracyImprovement, 1) + '%', 'Decisões mais precisas', 'var(--profit)')}
    ${statCard('Padrões Descobertos', patternsDiscovered, 'Relações mapeadas', 'var(--accent)')}
  `;

  html += '</div></div>';

  // Milestones
  const milestones = evo.milestones || [];
  if(milestones.length > 0) {
    html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Marcos Alcançados</div>';
    for(const m of milestones) {
      html += `<div style="padding:12px;background:var(--s2);border-left:3px solid var(--purple);border-radius:4px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600">${m.title || 'Marco'}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">${m.description || '—'}</div>
      </div>`;
    }
    html += '</div>';
  }

  return html;
}

// ─── Risk Tab ────────────────────────────────────────────────────
function renderRisk() {
  const risk = state.riskRadar || {};
  const overallRisk = risk.overall_risk_score || 0;
  const moduleRisks = risk.module_risks || {};

  let html = '<div class="section">';

  // Risk gauge
  html += '<div style="text-align:center;margin-bottom:24px">';
  html += '<div class="risk-gauge"><div class="risk-gauge-inner">';
  html += `<div class="risk-score" style="color:${overallRisk > 70 ? 'var(--loss)' : overallRisk > 40 ? 'var(--orange)' : 'var(--profit)'}">${fmtNum(overallRisk, 0)}</div>`;
  html += '<div class="risk-label">Risco Geral</div></div></div>';
  html += '<div style="font-size:11px;color:var(--dim);margin-top:12px">Escala: 0 = Muito Seguro | 100 = Muito Arriscado</div>';
  html += '</div>';

  // Module risks
  html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Risco por Módulo</div><div class="grid-2">';
  for(const [key, module] of Object.entries(MODULES)) {
    const risk_level = moduleRisks[key] || 0;
    const riskColor = risk_level > 70 ? 'var(--loss)' : risk_level > 40 ? 'var(--orange)' : 'var(--profit)';
    const riskLabel = risk_level > 70 ? 'ALTO' : risk_level > 40 ? 'MÉDIO' : 'BAIXO';

    html += `<div style="padding:16px;background:var(--s2);border-radius:8px;border-left:3px solid ${module.color}">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px">${module.label}</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="progress-bar" style="flex:1">
          <div class="progress-fill" style="width:${risk_level}%;background:${riskColor}"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:${riskColor};min-width:40px;text-align:right">${fmtNum(risk_level, 0)}</div>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:6px;text-transform:uppercase">${riskLabel}</div>
    </div>`;
  }
  html += '</div></div>';

  // Risk factors
  const factors = risk.risk_factors || [];
  if(factors.length > 0) {
    html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Fatores de Risco Ativos</div>';
    for(const f of factors) {
      const severity = f.severity || 'MÉDIO';
      const sevColor = severity === 'ALTO' ? 'var(--loss)' : severity === 'MÉDIO' ? 'var(--orange)' : 'var(--accent)';
      html += `<div style="padding:12px;background:var(--s2);border-radius:6px;border-left:2px solid ${sevColor};margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:12px;font-weight:600">${f.name || 'Fator'}</div>
          <span style="font-size:10px;color:${sevColor};font-weight:700;text-transform:uppercase">${severity}</span>
        </div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${f.description || '—'}</div>
      </div>`;
    }
    html += '</div>';
  }

  // Risk alerts
  const alerts = risk.active_alerts || [];
  if(alerts.length > 0) {
    html += '<div class="section"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--loss)">Alertas Ativos</div>';
    for(const a of alerts) {
      html += `<div style="padding:12px;background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.2);border-radius:6px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;color:var(--loss)">⚠️ ${a.title || 'Alerta'}</div>
        <div style="font-size:11px;color:var(--text);margin-top:4px">${a.message || '—'}</div>
      </div>`;
    }
    html += '</div>';
  }

  return html;
}

function statCard(label, value, sub, color) {
  return `<div class="card stat-card" style="border-top:2px solid ${color}20">
    <div class="stat-label">${label}</div>
    <div class="stat-value" style="color:${color}">${value}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

// ─── Proposals Tab (Nightly Analyst) ────────────────────────────
const _PROP_API = 'https://diligent-spirit-production.up.railway.app';

async function renderProposals(container) {
  container.innerHTML = '<div style="padding:40px;text-align:center;color:#8fa3be;font-family:monospace">Carregando propostas do Nightly Analyst…</div>';
  try {
    const resp = await fetch(`${_PROP_API}/api/brain/proposals?status=pending&limit=50`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const props = data.proposals || data.items || data || [];
    container.innerHTML = _buildProposalsUI(Array.isArray(props) ? props : []);
  } catch (err) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:#e74c3c">
      <div style="font-size:14px;margin-bottom:12px">Falha ao carregar propostas</div>
      <div style="font-family:monospace;font-size:11px">${err.message}</div>
      <button onclick="renderProposals(document.getElementById('tab-content'))"
              style="margin-top:16px;padding:8px 16px;background:rgba(184,151,58,0.15);
                     border:1px solid rgba(184,151,58,0.4);color:#b8973a;
                     cursor:pointer;font-family:monospace;font-size:11px">Tentar de novo</button>
    </div>`;
  }
}

function _buildProposalsUI(props) {
  const header = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:16px 20px;background:var(--navy2);border:1px solid var(--line);border-radius:4px">
      <div>
        <div style="font-family:'EB Garamond',serif;font-size:22px;color:var(--white)">Propostas do Nightly Analyst</div>
        <div style="font-family:monospace;font-size:10px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:4px">
          ${props.length} aguardando aprovação · Gerado por Claude Opus 4.7 às 23h BRT
        </div>
      </div>
      <button onclick="_triggerNightly()"
              style="padding:10px 20px;background:linear-gradient(180deg,rgba(184,151,58,0.15),rgba(184,151,58,0.08));
                     border:1px solid rgba(184,151,58,0.4);color:#b8973a;cursor:pointer;
                     font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase">
        🌙 Disparar Nightly Agora
      </button>
    </div>`;

  if (props.length === 0) {
    return header + `<div style="padding:60px;text-align:center;color:var(--text3);font-family:monospace;font-size:12px">
      Nenhuma proposta pendente no momento.<br>
      <span style="opacity:0.7">Próxima execução automática: 23:02 BRT</span>
    </div>`;
  }

  const sevIcon = { CRITICAL:'🔴', HIGH:'🟠', MEDIUM:'🟡', LOW:'🟢' };
  const sevColor = { CRITICAL:'#e74c3c', HIGH:'#e67e22', MEDIUM:'#f1c40f', LOW:'#2ecc71' };

  const cards = props.map(p => {
    const sev = p.severity || 'MEDIUM';
    const icon = sevIcon[sev] || '⚪';
    const color = sevColor[sev] || '#8fa3be';
    const cat = p.category || 'tuning';
    const createdAt = p.created_at ? new Date(p.created_at).toLocaleString('pt-BR') : '—';
    const evidenceStr = p.evidence ? JSON.stringify(p.evidence, null, 2) : '';
    return `
    <div style="background:var(--navy2);border:1px solid var(--line);border-left:3px solid ${color};
                border-radius:4px;padding:20px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:16px;margin-bottom:12px">
        <div style="flex:1">
          <div style="font-family:'EB Garamond',serif;font-size:17px;color:var(--white);margin-bottom:4px">
            ${icon} ${_esc(p.title || '(sem título)')}
          </div>
          <div style="font-family:monospace;font-size:9px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase">
            #${p.id} · ${cat} · severidade ${sev} · criado ${createdAt}
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button onclick="_approveProposal(${p.id}, this)"
                  style="padding:8px 16px;background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.4);
                         color:#2ecc71;cursor:pointer;font-family:monospace;font-size:10px;
                         letter-spacing:.1em;text-transform:uppercase">✓ Aprovar</button>
          <button onclick="_rejectProposal(${p.id}, this)"
                  style="padding:8px 16px;background:rgba(231,76,60,0.12);border:1px solid rgba(231,76,60,0.4);
                         color:#e74c3c;cursor:pointer;font-family:monospace;font-size:10px;
                         letter-spacing:.1em;text-transform:uppercase">✗ Rejeitar</button>
        </div>
      </div>
      ${_propField('Estado atual', p.current_state)}
      ${_propField('Mudança proposta', p.proposed_change)}
      ${_propField('Racional', p.rationale)}
      ${_propField('Impacto esperado', p.expected_impact)}
      ${evidenceStr && evidenceStr !== '{}' ? `
        <details style="margin-top:12px">
          <summary style="cursor:pointer;font-family:monospace;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase">Evidence (dados)</summary>
          <pre style="background:rgba(0,0,0,0.3);padding:12px;margin-top:8px;font-size:10px;
                      color:var(--text2);overflow:auto;max-height:200px;border-radius:3px">${_esc(evidenceStr)}</pre>
        </details>
      ` : ''}
    </div>`;
  }).join('');

  return header + cards;
}

function _propField(label, value) {
  if (!value) return '';
  return `<div style="margin-top:10px">
    <div style="font-family:monospace;font-size:9px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px">${label}</div>
    <div style="color:var(--text);font-size:13px;line-height:1.5">${_esc(value)}</div>
  </div>`;
}

function _esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

async function _approveProposal(id, btn) {
  const key = prompt('Cole sua X-API-Key para aprovar (necessária para autenticar):');
  if (!key) return;
  btn.disabled = true; btn.textContent = '…aprovando';
  try {
    const r = await fetch(`${_PROP_API}/api/brain/proposals/${id}/approve`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-API-Key': key},
      body: JSON.stringify({approved_by: 'dashboard'})
    });
    const j = await r.json();
    if (r.ok) {
      alert('✓ Proposta #' + id + ' aprovada.');
      renderProposals(document.getElementById('tab-content'));
    } else {
      alert('Falha: ' + (j.error || r.status));
      btn.disabled = false; btn.textContent = '✓ Aprovar';
    }
  } catch (e) {
    alert('Erro: ' + e.message);
    btn.disabled = false; btn.textContent = '✓ Aprovar';
  }
}

async function _rejectProposal(id, btn) {
  const key = prompt('Cole sua X-API-Key para rejeitar:');
  if (!key) return;
  const reason = prompt('Motivo da rejeição (opcional):') || '';
  btn.disabled = true; btn.textContent = '…rejeitando';
  try {
    const r = await fetch(`${_PROP_API}/api/brain/proposals/${id}/reject`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-API-Key': key},
      body: JSON.stringify({rejected_by: 'dashboard', reason})
    });
    const j = await r.json();
    if (r.ok) {
      alert('✗ Proposta #' + id + ' rejeitada.');
      renderProposals(document.getElementById('tab-content'));
    } else {
      alert('Falha: ' + (j.error || r.status));
      btn.disabled = false; btn.textContent = '✗ Rejeitar';
    }
  } catch (e) {
    alert('Erro: ' + e.message);
    btn.disabled = false; btn.textContent = '✗ Rejeitar';
  }
}

async function _triggerNightly() {
  const key = prompt('Cole sua X-API-Key para disparar o Nightly (demora ~60s):');
  if (!key) return;
  alert('Disparado. Relatório + novas propostas vão aparecer em ~1-2 min. Recarregue esta tela.');
  try {
    await fetch(`${_PROP_API}/api/brain/nightly/run`, {
      method: 'POST', headers: {'X-API-Key': key}
    });
  } catch (e) { /* fire and forget */ }
}

// ─── Init ───────────────────────────────────────────────────────
fetchAll();
if(state.autoRefresh) autoInterval = setInterval(fetchAll, 30000);
</script>
