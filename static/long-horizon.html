<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egreja — Long Horizon AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-dim:#7A5C1A;--profit:#22C55E;--loss:#EF4444;--accent:#60A5FA;--purple:#A78BFA;--cyan:#22D3EE;--orange:#FB923C;--pink:#EC4899;--red:#F43F5E;--s1:#060A10;--s2:#0B1018;--s3:#111820;--border:#1A2332;--muted:#374151;--text:#E2E8F0;--dim:#64748B;--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif}
body{font-family:var(--sans);background:var(--s1);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(6,10,16,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
.header p{font-size:11px;color:var(--dim);margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--s3)}
.btn-active{background:#2563EB;border-color:#2563EB;color:#fff}
.btn-active:hover{background:#1D4ED8}
.container{max-width:1600px;margin:0 auto;padding:24px}

/* Grids */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1024px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}

/* Cards */
.card{background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.2),transparent)}
.card-header{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:16px}
.stat-card{padding:16px;display:flex;flex-direction:column;gap:8px}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.stat-value{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--dim)}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--s3);border-radius:8px;padding:4px;overflow-x:auto;margin-bottom:24px;border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;background:transparent;color:var(--dim);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--s2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700}
.badge-healthy{background:rgba(34,197,94,.1);color:var(--profit);border:1px solid rgba(34,197,94,.2)}
.badge-degraded{background:rgba(239,68,68,.1);color:var(--loss);border:1px solid rgba(239,68,68,.2)}
.badge-warning{background:rgba(251,146,60,.1);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.badge-info{background:rgba(96,165,250,.1);color:var(--accent);border:1px solid rgba(96,165,250,.2)}
.badge-neutral{background:rgba(100,116,139,.1);color:var(--dim);border:1px solid rgba(100,116,139,.2)}
.badge-conviction-buy{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.badge-buy{background:rgba(34,197,94,.15);color:var(--profit);border:1px solid rgba(34,197,94,.3)}
.badge-neutral-conv{background:rgba(96,165,250,.15);color:var(--accent);border:1px solid rgba(96,165,250,.3)}
.badge-caution{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.badge-avoid{background:rgba(239,68,68,.15);color:var(--loss);border:1px solid rgba(239,68,68,.3)}

/* Table */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--dim);font-weight:600;font-size:11px;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid rgba(26,35,50,.4)}
tr:hover{background:rgba(17,24,32,.5)}
.text-right{text-align:right}
.text-mono{font-family:var(--mono)}
.text-profit{color:var(--profit)}
.text-loss{color:var(--loss)}
.text-dim{color:var(--dim)}
.text-accent{color:var(--accent)}

/* Health banner */
.health-banner{padding:12px 16px;border-radius:8px;display:flex;align-items:center;gap:12px;margin-bottom:24px;font-size:13px;font-weight:600;border:1px solid}
.banner-healthy{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:var(--profit)}
.banner-degraded{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);color:var(--loss)}
.banner-warning{background:rgba(251,146,60,.06);border-color:rgba(251,146,60,.2);color:var(--orange)}

/* Empty state */
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}

/* Score bar */
.score-bar{display:flex;align-items:center;gap:8px;flex:1}
.score-bar-container{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.score-bar-value{font-family:var(--mono);font-size:11px;font-weight:600;min-width:32px;text-align:right}

/* Section */
.section{margin-bottom:24px}

/* Progress bar */
.progress-bar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px}

/* Mini cards */
.mini-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:all .2s}
.mini-card:hover{border-color:var(--accent);background:var(--s3)}

/* Thesis card */
.thesis-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;margin-bottom:16px}

/* Loading */
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.info-row{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(26,35,50,.4)}
.info-label{color:var(--dim);min-width:140px;font-weight:600}
.info-value{color:var(--text);font-family:var(--mono)}

.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-col{display:flex;flex-direction:column;gap:8px}
.gap-sm{gap:4px}
.gap-md{gap:8px}
.gap-lg{gap:16px}

/* Fonts link */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
</style>
</head>
<body>

<div class="header" style="flex-wrap:wrap;gap:12px">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:8px 18px;background:linear-gradient(135deg,#C9A84C,#7A5C1A);color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;letter-spacing:.02em;box-shadow:0 2px 8px rgba(201,168,76,.3);transition:all .2s" title="Voltar ao Dashboard Principal">
      <span style="font-size:18px">←</span> Dashboard Principal
    </a>
    <img src="/logo.png" alt="Egreja IA" style="height:34px;width:auto">
    <div>
      <h1>Long Horizon AI</h1>
      <p id="header-subtitle">Motor de Investimento de Longo Prazo · 8 Ativos · R$ 8M</p>
    </div>
  </div>
  <div class="header-right">
    <span id="market-clock" class="text-mono" style="font-size:11px;color:var(--dim)"></span>
    <span class="text-mono" style="font-size:11px;color:var(--dim)" id="last-refresh">—</span>
    <button class="btn" onclick="refresh()" id="refresh-btn">🔄 Atualizar</button>
    <button class="btn btn-active" onclick="toggleAuto()" id="auto-btn">⚡ Auto ON</button>
  </div>
</div>

<div class="container">
  <!-- Health Banner -->
  <div id="health-banner"></div>

  <!-- KPI Grid -->
  <div class="grid-4 section" id="kpi-grid"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-bar"></div>

  <!-- Tab Content -->
  <div id="tab-content"></div>
</div>

<script>
const RW = 'https://diligent-spirit-production.up.railway.app';
const API = RW + '/long-horizon';

let state = {
  systemState: null,
  ranking: [],
  portfolios: [],
  capital: null,
  pnl: null,
  winRate: null,
  backtest: null,
  alerts: [],
  health: null,
  theses: {},
  activeTab: 'overview',
  autoRefresh: true,
  loading: false
};

let autoInterval = null;
  let tickerPrices = {}; // real-time prices from ticker-tape API
  async function fetchTickerPrices() {
    try {
      const res = await fetch(RW + '/api/ticker-tape');
      if (!res.ok) return;
      const data = await res.json();
      (data.items || []).forEach(i => { tickerPrices[i.t] = i; });
    } catch(e) { console.warn('ticker-prices:', e.message); }
  }
let thesesLoaded = false;

// ─── Data Fetching ──────────────────────────────────────────────
async function fetchAll() {
    fetchTickerPrices(); // refresh real-time prices in background
  state.loading = true;
  renderRefreshBtn();
  try {
    const results = await Promise.allSettled([
      fetch(`${API}/system-state`).then(r => r.json()).catch(() => null),
      fetch(`${API}/ranking`).then(r => r.json()).catch(() => null),
      fetch(`${API}/portfolios`).then(r => r.json()).catch(() => null),
      fetch(`${API}/capital`).then(r => r.json()).catch(() => null),
      fetch(`${API}/pnl`).then(r => r.json()).catch(() => null),
      fetch(`${API}/win-rate`).then(r => r.json()).catch(() => null),
      fetch(`${API}/backtest`).then(r => r.json()).catch(() => null),
      fetch(`${API}/alerts`).then(r => r.json()).catch(() => null),
      fetch(`${API}/health`).then(r => r.json()).catch(() => null),
      fetch(`${API}/closed-trades?limit=200`).then(r => r.json()).catch(() => null),
      fetch(`${RW}/performance/benchmark?days=30`).then(r => r.json()).catch(() => null),
    ]);

    state.systemState = results[0].status === 'fulfilled' ? results[0].value : null;
    state.ranking = results[1].status === 'fulfilled' ? (results[1].value?.ranking || []) : [];
    state.portfolios = results[2].status === 'fulfilled' ? (results[2].value?.portfolios || []) : [];
    state.capital = results[3].status === 'fulfilled' ? results[3].value : null;
    state.pnl = results[4].status === 'fulfilled' ? results[4].value : null;
    state.winRate = results[5].status === 'fulfilled' ? results[5].value : null;
    state.backtest = results[6].status === 'fulfilled' ? results[6].value : null;
    state.alerts = results[7].status === 'fulfilled' ? (results[7].value?.alerts || []) : [];
    state.health = results[8].status === 'fulfilled' ? results[8].value : null;
    state.closedTrades = results[9].status === 'fulfilled' ? results[9].value : null;
    state.benchmark = results[10].status === 'fulfilled' ? results[10].value : null;

    state.loading = false;
    updateClock();
    render();
  } catch (e) {
    console.error('Fetch error:', e);
    state.loading = false;
    render();
  }
}

async function fetchTheses() {
  if (thesesLoaded) return;
  try {
    const tickers = state.ranking.map(r => r.ticker).slice(0, 8);
    for (const ticker of tickers) {
      const result = await fetch(`${API}/thesis/${ticker}`).then(r => r.json()).catch(() => null);
      if (result) {
        state.theses[ticker] = result;
      }
    }
    thesesLoaded = true;
    if (state.activeTab === 'teses') render();
  } catch (e) {
    console.error('Thesis fetch error:', e);
  }
}

// ─── Formatting ────────────────────────────────────────────────
function formatBRL(n) {
  if (!n && n !== 0) return '—';
  const s = Math.abs(n).toFixed(2).replace('.', ',');
  const parts = s.split(',');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return (n < 0 ? '-' : '') + 'R$ ' + parts.join(',');
}

function formatPct(n) {
  if (!n && n !== 0) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

function formatNum(n) {
  if (!n && n !== 0) return '—';
  return Math.abs(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function scoreColor(score) {
  if (score >= 85) return 'var(--gold)';
  if (score >= 70) return 'var(--profit)';
  if (score >= 55) return 'var(--accent)';
  if (score >= 40) return 'var(--orange)';
  return 'var(--loss)';
}

function convictionBadge(conviction) {
  const map = {
    'Conviction Buy': { cls: 'badge-conviction-buy', label: '⭐ Conviction Buy' },
    'Buy': { cls: 'badge-buy', label: '🟢 Buy' },
    'Neutral': { cls: 'badge-neutral-conv', label: '🔵 Neutral' },
    'Caution': { cls: 'badge-caution', label: '🟠 Caution' },
    'Avoid': { cls: 'badge-avoid', label: '🔴 Avoid' }
  };
  const m = map[conviction] || map['Neutral'];
  return `<span class="badge ${m.cls}">${m.label}</span>`;
}

function updateClock() {
  const now = new Date();
  const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const h = String(brt.getHours()).padStart(2, '0');
  const m = String(brt.getMinutes()).padStart(2, '0');
  const s = String(brt.getSeconds()).padStart(2, '0');
  document.getElementById('market-clock').textContent = `${h}:${m}:${s}`;
}

function renderRefreshBtn() {
  const btn = document.getElementById('refresh-btn');
  if (state.loading) {
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';
  } else {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

// ─── Health Banner ────────────────────────────────────────────────
function renderHealthBanner() {
  if (!state.health) {
    return `<div class="health-banner banner-warning">
      ⏳ Aguardando dados de saúde...
    </div>`;
  }

  const h = state.health;
  const status = h.status || 'degraded';
  const bannerClass = status === 'healthy' ? 'banner-healthy' : 'banner-warning';
  const statusEmoji = status === 'healthy' ? '✅' : '⚠️';

  return `<div class="health-banner ${bannerClass}">
    ${statusEmoji} ${h.message || 'Sistema operacional'}
  </div>`;
}

// ─── Tabs ────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = [
    { id: 'overview', label: 'Overview' },
    { id: 'ranking', label: 'Ranking' },
    { id: 'teses', label: 'Teses' },
    { id: 'carteiras', label: 'Carteiras' },
    { id: 'pnl', label: 'P&L' },
    { id: 'backtests', label: 'Backtests' },
    { id: 'capital', label: 'Capital' },
    { id: 'alertas', label: 'Alertas' },
    { id: 'saude', label: 'Saúde' },
    { id: 'historico', label: 'Histórico' },
    { id: 'benchmark', label: 'Benchmark' }
  ];

  let html = '';
  for (const tab of tabs) {
    const active = state.activeTab === tab.id ? 'active' : '';
    html += `<button class="tab ${active}" onclick="switchTab('${tab.id}')">${tab.label}</button>`;
  }
  return html;
}

function switchTab(tabId) {
  state.activeTab = tabId;
  if (tabId === 'teses') {
    fetchTheses().then(() => render());
  } else {
    render();
  }
}

// ─── KPI Cards ────────────────────────────────────────────────────
function renderKPIGrid() {
  const capital = state.capital?.capital_inicial || 8000000;
  const current = state.capital?.valor_atual || 8000000;
  const pnlTotal = state.pnl?.total_pnl || 0;
  const pnlPct = ((pnlTotal / capital) * 100) || 0;
  const winRate = state.winRate?.win_rate || 0;
  const bestScore = state.ranking?.[0]?.score || 0;
  const assetCount = state.ranking?.length || 8;

  const kpis = [
    { label: 'Capital Inicial', value: formatBRL(capital) },
    { label: 'Valor Atual', value: formatBRL(current) },
    { label: 'P&L Total', value: formatPct(pnlPct), color: pnlPct >= 0 ? 'var(--profit)' : 'var(--loss)' },
    { label: 'Win Rate', value: formatPct(winRate) },
    { label: 'Melhor Score', value: bestScore.toFixed(0) },
    { label: 'Ativos Monitorados', value: assetCount }
  ];

  let html = '';
  for (const kpi of kpis) {
    const color = kpi.color || 'var(--text)';
    html += `<div class="card stat-card">
      <div class="stat-label">${kpi.label}</div>
      <div class="stat-value" style="color:${color}">${kpi.value}</div>
    </div>`;
  }
  return html;
}

// ─── Overview Tab ────────────────────────────────────────────────
function renderOverview() {
  const top3 = state.ranking?.slice(0, 3) || [];

  let top3Html = '';
  for (const asset of top3) {
    const barColor = scoreColor(asset.score);
    const pct = (asset.score / 100) * 100;
    top3Html += `<div class="mini-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px">${asset.ticker}</div>
          <div style="color:var(--dim);font-size:11px">${asset.name}</div>
        </div>
        <div style="font-size:20px;font-weight:700;color:${barColor};font-family:var(--mono)">${asset.score.toFixed(0)}</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>`;
  }

  const portfolios = state.portfolios?.slice(0, 3) || [];
  let portHtml = '';
  for (const port of portfolios) {
    const ret = port.return_pct || 0;
    const bench = port.benchmark_pct || 0;
    const diff = ret - bench;
    portHtml += `<div class="mini-card">
      <div style="font-weight:600;font-size:13px">${port.name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px">
        <div>
          <div style="color:var(--dim)">Retorno</div>
          <div style="color:${ret >= 0 ? 'var(--profit)' : 'var(--loss)'},font-family:var(--mono);font-weight:600">${formatPct(ret)}</div>
        </div>
        <div>
          <div style="color:var(--dim)">vs Bench</div>
          <div style="color:${diff >= 0 ? 'var(--profit)' : 'var(--loss)'},font-family:var(--mono);font-weight:600">${formatPct(diff)}</div>
        </div>
      </div>
    </div>`;
  }

  return `
    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:14px;font-weight:600">Top 3 Ativos</h2>
      </div>
      <div class="grid-3">${top3Html}</div>
    </div>

    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:14px;font-weight:600">Carteiras Modelo</h2>
      </div>
      <div class="grid-3">${portHtml}</div>
    </div>

    <div class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 style="font-size:14px;font-weight:600">Links Rápidos</h2>
      </div>
      <div class="grid-4">
        <div class="mini-card" onclick="switchTab('ranking')" style="background:rgba(96,165,250,.05);border-color:rgba(96,165,250,.2)">
          <div style="font-size:20px">📊</div>
          <div style="font-weight:600">Ranking</div>
          <div style="color:var(--dim);font-size:11px">Scores dos ativos</div>
        </div>
        <div class="mini-card" onclick="switchTab('teses')" style="background:rgba(201,168,76,.05);border-color:rgba(201,168,76,.2)">
          <div style="font-size:20px">📝</div>
          <div style="font-weight:600">Teses</div>
          <div style="color:var(--dim);font-size:11px">Análise detalhada</div>
        </div>
        <div class="mini-card" onclick="switchTab('carteiras')" style="background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2)">
          <div style="font-size:20px">💼</div>
          <div style="font-weight:600">Carteiras</div>
          <div style="color:var(--dim);font-size:11px">Alocação</div>
        </div>
        <div class="mini-card" onclick="switchTab('pnl')" style="background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2)">
          <div style="font-size:20px">📈</div>
          <div style="font-weight:600">P&L</div>
          <div style="color:var(--dim);font-size:11px">Resultado</div>
        </div>
      </div>
    </div>
  `;
}

// ─── Ranking Tab ────────────────────────────────────────────────
function renderRanking() {
  if (!state.ranking || state.ranking.length === 0) {
    return `<div class="section"><div class="card"><div class="card-body"><div class="empty-state">
      <div style="font-size:32px;opacity:.3;margin-bottom:8px">📊</div>
      <p>Aguardando dados...</p>
    </div></div></div></div>`;
  }

  let rows = '';
  for (let i = 0; i < state.ranking.length; i++) {
    const r = state.ranking[i];
    const barColor = scoreColor(r.score);
    const barPct = (r.score / 100) * 100;
    const convBadge = convictionBadge(r.conviction || 'Neutral');

    const tp = tickerPrices[r.ticker] || {};
    const price = tp.p || 0;
    const chg = tp.c || 0;
    const cur = tp.cur === 'USD' ? '$' : 'R$';
    const priceStr = price > 0 ? cur + price.toLocaleString(tp.cur === 'USD' ? 'en-US' : 'pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
    const chgColor = chg > 0.01 ? '#22C55E' : chg < -0.01 ? '#EF4444' : '#64748B';
    const chgArrow = chg > 0.01 ? '▲' : chg < -0.01 ? '▼' : '─';
    const chgBg = chg > 0.01 ? 'rgba(34,197,94,0.08)' : chg < -0.01 ? 'rgba(239,68,68,0.08)' : 'transparent';
    const chgStr = price > 0 ? chgArrow + ' ' + (chg > 0 ? '+' : '') + chg.toFixed(2) + '%' : '—';
    rows += `<tr style="cursor:pointer" onclick="showAssetDetail('${r.ticker}')">
      <td>${i + 1}</td>
      <td style="font-family:var(--mono);font-weight:600">${r.ticker}</td>
      <td style="text-align:right;font-family:var(--mono);font-size:12px;color:var(--text)">${priceStr}</td>
      <td style="text-align:right;font-family:var(--mono);font-size:11px;font-weight:600;color:${chgColor};background:${chgBg};border-radius:3px;padding:6px 8px">${chgStr}</td>
      <td>
        <div class="score-bar">
          <div class="score-bar-container">
            <div class="score-bar-fill" style="width:${barPct}%;background:${barColor}"></div>
          </div>
          <div class="score-bar-value">${r.score.toFixed(0)}</div>
        </div>
      </td>
      <td>${convBadge}</td>
      <td class="text-right">${formatPct(r.quality_score || 0)}</td>
      <td class="text-right">${formatPct(r.valuation_score || 0)}</td>
      <td class="text-right">${formatPct(r.market_score || 0)}</td>
      <td style="color:var(--dim);text-align:center">${r.action || '—'}</td>
    </tr>`;
  }

  return `<div class="section card">
    <div class="card-header">
      <div class="card-title">📊 Ranking de Ativos</div>
    </div>
    <div class="card-body" style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Pos</th><th>Ticker</th><th style="text-align:right">Preço</th><th style="text-align:right">Var %</th><th>Score</th><th>Convicção</th>
            <th class="text-right">Qualidade</th><th class="text-right">Valuation</th><th class="text-right">Mercado</th><th style="text-align:center">Ação</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ─── Carteiras Tab ────────────────────────────────────────────────

function renderBenchmark() {
  const d = state.benchmark;
  if (!d || !d.summary) {
    return `<div class="section"><div class="card"><div class="card-body"><div class="empty-state">
      <div style="font-size:32px;opacity:.3;margin-bottom:8px">📊</div>
      <p>Sem dados de benchmark disponíveis.</p>
      <p style="font-size:11px;color:var(--dim);margin-top:8px">O endpoint /performance/benchmark retorna histórico de retorno vs IBOV e SPY.</p>
    </div></div></div></div>`;
  }

  const s = d.summary;
  const series = d.series || [];
  const ab = d.alpha_beta || {};

  // Determinar cores
  const sysColor = s.system_cum_return_pct >= 0 ? 'var(--profit)' : 'var(--loss)';
  const alphaIbovColor = s.alpha_vs_ibov_pct >= 0 ? 'var(--profit)' : 'var(--loss)';
  const alphaSpyColor = s.alpha_vs_spy_pct >= 0 ? 'var(--profit)' : 'var(--loss)';

  // === Cards de resumo ===
  const cards = `
    <div class="grid-4" style="margin-bottom:16px">
      <div class="card stat-card">
        <div class="stat-label">Sistema (${s.period_days}d)</div>
        <div class="stat-value" style="color:${sysColor}">${(s.system_cum_return_pct >= 0 ? '+' : '') + s.system_cum_return_pct.toFixed(2)}%</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${s.total_trades} trades · WR ${s.win_rate_pct}%</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">IBOV (mesmo período)</div>
        <div class="stat-value" style="color:${s.ibov_cum_return_pct >= 0 ? 'var(--profit)' : 'var(--loss)'}">${s.ibov_cum_return_pct != null ? ((s.ibov_cum_return_pct >= 0 ? '+' : '') + s.ibov_cum_return_pct.toFixed(2)) + '%' : '—'}</div>
        <div style="font-size:11px;color:${alphaIbovColor};margin-top:4px;font-weight:600">Alpha: ${(s.alpha_vs_ibov_pct >= 0 ? '+' : '') + s.alpha_vs_ibov_pct.toFixed(2)}pp</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">SPY (mesmo período)</div>
        <div class="stat-value" style="color:${s.spy_cum_return_pct >= 0 ? 'var(--profit)' : 'var(--loss)'}">${s.spy_cum_return_pct != null ? ((s.spy_cum_return_pct >= 0 ? '+' : '') + s.spy_cum_return_pct.toFixed(2)) + '%' : '—'}</div>
        <div style="font-size:11px;color:${alphaSpyColor};margin-top:4px;font-weight:600">Alpha: ${(s.alpha_vs_spy_pct >= 0 ? '+' : '') + s.alpha_vs_spy_pct.toFixed(2)}pp</div>
      </div>
      <div class="card stat-card">
        <div class="stat-label">P&amp;L Total</div>
        <div class="stat-value" style="color:${s.total_pnl >= 0 ? 'var(--profit)' : 'var(--loss)'}">${formatBRL(s.total_pnl)}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:4px">${s.trading_days} pregões</div>
      </div>
    </div>
  `;

  // === Gráfico SVG sobreposto ===
  let chart = '';
  if (series.length > 1) {
    const w = 900, h = 300, padL = 50, padR = 20, padT = 20, padB = 40;
    const iw = w - padL - padR;
    const ih = h - padT - padB;

    const allValues = series.flatMap(pt => [pt.system_cum_pct, pt.ibov_cum_pct || 0, pt.spy_cum_pct || 0]);
    const yMin = Math.min(...allValues, 0);
    const yMax = Math.max(...allValues, 0);
    const yRange = Math.max(yMax - yMin, 1);

    const xStep = iw / Math.max(series.length - 1, 1);
    const toXY = (i, v) => [padL + i * xStep, padT + ih - ((v - yMin) / yRange) * ih];

    const buildLine = (key) => series.map((pt, i) => {
      const [x, y] = toXY(i, pt[key] || 0);
      return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
    }).join(' ');

    const sysPath = buildLine('system_cum_pct');
    const ibovPath = buildLine('ibov_cum_pct');
    const spyPath = buildLine('spy_cum_pct');

    // Y-axis labels
    const ySteps = 5;
    let yLabels = '';
    for (let k = 0; k <= ySteps; k++) {
      const v = yMin + (yRange * k / ySteps);
      const y = padT + ih - (k / ySteps) * ih;
      yLabels += `<text x="${padL - 5}" y="${y + 4}" text-anchor="end" fill="var(--dim)" font-size="10" font-family="var(--mono)">${v.toFixed(1)}%</text>`;
      yLabels += `<line x1="${padL}" y1="${y}" x2="${w - padR}" y2="${y}" stroke="var(--dim)" stroke-opacity="0.1" stroke-dasharray="2,2"/>`;
    }

    // X-axis labels (primeira, média, última)
    const xIdx = [0, Math.floor(series.length / 2), series.length - 1];
    let xLabels = '';
    for (const i of xIdx) {
      const [x, _] = toXY(i, 0);
      const d = series[i].date.slice(5);
      xLabels += `<text x="${x}" y="${h - 15}" text-anchor="middle" fill="var(--dim)" font-size="10" font-family="var(--mono)">${d}</text>`;
    }

    // Zero line
    const [_, yZero] = toXY(0, 0);
    const zeroLine = (yZero > padT && yZero < padT + ih)
      ? `<line x1="${padL}" y1="${yZero}" x2="${w - padR}" y2="${yZero}" stroke="var(--dim)" stroke-width="1.5"/>`
      : '';

    chart = `
      <div class="card section" style="margin-bottom:16px">
        <div class="card-header">
          <div class="card-title">Retorno acumulado — Sistema vs IBOV vs SPY</div>
          <div style="display:flex;gap:16px;font-size:11px">
            <span style="color:#60a5fa">━ Sistema</span>
            <span style="color:#22c55e">━ IBOV</span>
            <span style="color:#c9a84c">━ SPY</span>
          </div>
        </div>
        <div class="card-body" style="overflow-x:auto">
          <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
            ${yLabels}
            ${zeroLine}
            <path d="${ibovPath}" stroke="#22c55e" stroke-width="1.8" fill="none" opacity="0.8"/>
            <path d="${spyPath}" stroke="#c9a84c" stroke-width="1.8" fill="none" opacity="0.8"/>
            <path d="${sysPath}" stroke="#60a5fa" stroke-width="2.2" fill="none"/>
            ${xLabels}
          </svg>
        </div>
      </div>
    `;
  }

  // === Alpha/Beta por mercado ===
  let abRows = '';
  for (const [mkt, m] of Object.entries(ab)) {
    const alpha = m.alpha_absolute_pct || 0;
    const bench = m.benchmark || 'none';
    const alphaColor = alpha >= 0 ? 'var(--profit)' : 'var(--loss)';
    const cumColor = (m.cum_return_pct || 0) >= 0 ? 'var(--profit)' : 'var(--loss)';
    const sharpe = m.sharpe_annualized || 0;
    const sharpeColor = sharpe >= 1 ? 'var(--profit)' : (sharpe >= 0 ? 'var(--text)' : 'var(--loss)');
    abRows += `<tr>
      <td style="font-weight:600">${mkt}</td>
      <td>${bench}</td>
      <td class="text-right" style="color:${cumColor}">${(m.cum_return_pct >= 0 ? '+' : '') + (m.cum_return_pct || 0).toFixed(2)}%</td>
      <td class="text-right" style="color:var(--dim)">${bench !== 'none' ? ((m.benchmark_cum_pct >= 0 ? '+' : '') + (m.benchmark_cum_pct || 0).toFixed(2)) + '%' : '—'}</td>
      <td class="text-right" style="color:${alphaColor};font-weight:600">${bench !== 'none' ? ((alpha >= 0 ? '+' : '') + alpha.toFixed(2)) + 'pp' : '—'}</td>
      <td class="text-right">${bench !== 'none' ? (m.beta || 0).toFixed(3) : '—'}</td>
      <td class="text-right" style="color:${sharpeColor};font-weight:600">${sharpe.toFixed(2)}</td>
      <td class="text-right">${m.trades || 0}</td>
      <td class="text-right">${m.win_rate_pct || 0}%</td>
      <td class="text-right" style="color:var(--loss)">${m.max_drawdown_pct ? '-' + m.max_drawdown_pct.toFixed(2) + '%' : '—'}</td>
    </tr>`;
  }

  const tableAB = `
    <div class="card section">
      <div class="card-header">
        <div class="card-title">Alpha, Beta, Sharpe por Mercado</div>
        <div style="font-size:11px;color:var(--dim)">
          Alpha = retorno sistema − retorno benchmark. Beta = sensibilidade ao índice (1.0 = move junto, 0 = descorrelacionado).
        </div>
      </div>
      <div class="card-body" style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Mercado</th>
              <th>Benchmark</th>
              <th class="text-right">Retorno Sistema</th>
              <th class="text-right">Retorno Bench</th>
              <th class="text-right">Alpha</th>
              <th class="text-right">Beta</th>
              <th class="text-right">Sharpe</th>
              <th class="text-right">Trades</th>
              <th class="text-right">WR</th>
              <th class="text-right">Max DD</th>
            </tr>
          </thead>
          <tbody>${abRows}</tbody>
        </table>
      </div>
    </div>
  `;

  return `<div class="section">${cards}${chart}${tableAB}</div>`;
}

// ─── Histórico de Trades Fechadas ─────────────────────────────────
function renderHistorico() {
  const data = state.closedTrades;
  if (!data || !data.trades || data.trades.length === 0) {
    return `<div class="section"><div class="card"><div class="card-body"><div class="empty-state">
      <div style="font-size:32px;opacity:.3;margin-bottom:8px">📜</div>
      <p>Nenhuma trade fechada ainda.</p>
      <p style="font-size:11px;color:var(--dim);margin-top:8px">As trades aparecerão aqui quando posições forem fechadas por stop, target, thesis_broken ou ajuste manual.</p>
    </div></div></div></div>`;
  }

  const trades = data.trades;
  const totalPnL = data.total_pnl_realized || 0;
  const wins = data.wins || 0;
  const losses = data.losses || 0;
  const winRate = data.win_rate_pct || 0;

  let rows = '';
  for (const t of trades) {
    const pnlPct = t.pnl_pct || 0;
    const pnlValue = t.pnl_value || 0;
    const pnlColor = pnlPct >= 0 ? 'var(--profit)' : 'var(--loss)';
    const icon = pnlPct >= 0 ? '✓' : '✗';
    const reason = (t.close_reason || '').replace(/_/g, ' ');
    const reasonShort = reason.length > 20 ? reason.slice(0, 18) + '…' : reason;
    const entryDate = t.entry_date ? new Date(t.entry_date).toLocaleDateString('pt-BR') : '—';
    const closeDate = t.close_date ? new Date(t.close_date).toLocaleDateString('pt-BR') : '—';

    rows += `<tr>
      <td style="font-family:var(--mono);font-weight:600">${t.ticker}</td>
      <td style="font-size:11px;color:var(--dim)">${t.sector || '—'}</td>
      <td class="text-right" style="font-size:11px">${entryDate}</td>
      <td class="text-right" style="font-size:11px">${closeDate}</td>
      <td class="text-right" style="font-size:11px;color:var(--dim)">${t.weeks_held || 0}sem</td>
      <td class="text-right">${formatBRL(t.entry_price)}</td>
      <td class="text-right">${formatBRL(t.close_price)}</td>
      <td class="text-right" style="font-size:11px">${formatBRL(t.capital_allocated)}</td>
      <td class="text-right" style="color:${pnlColor};font-weight:600">${pnlValue >= 0 ? '+' : ''}${formatBRL(pnlValue)}</td>
      <td class="text-right" style="color:${pnlColor};font-weight:700">${icon} ${formatPct(pnlPct)}</td>
      <td style="font-size:10px;color:var(--dim)">${reasonShort}</td>
    </tr>`;
  }

  return `
    <div class="section">
      <div class="grid-4" style="margin-bottom:16px">
        <div class="card stat-card">
          <div class="stat-label">Total Fechadas</div>
          <div class="stat-value">${trades.length}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Wins / Losses</div>
          <div class="stat-value" style="font-size:18px">${wins} / ${losses}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Win Rate</div>
          <div class="stat-value" style="color:${winRate >= 50 ? 'var(--profit)' : 'var(--loss)'}">${formatPct(winRate)}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">P&amp;L Realizado</div>
          <div class="stat-value" style="color:${totalPnL >= 0 ? 'var(--profit)' : 'var(--loss)'}">${formatBRL(totalPnL)}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Histórico de Trades Fechadas</div>
          <div style="font-size:11px;color:var(--dim)">Ordenado por data de fechamento (mais recente primeiro)</div>
        </div>
        <div class="card-body" style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Setor</th>
                <th class="text-right">Entrada</th>
                <th class="text-right">Saída</th>
                <th class="text-right">Duração</th>
                <th class="text-right">Preço Entrada</th>
                <th class="text-right">Preço Saída</th>
                <th class="text-right">Capital</th>
                <th class="text-right">P&amp;L R$</th>
                <th class="text-right">P&amp;L %</th>
                <th>Motivo</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function render() {
  // Render health banner
  document.getElementById('health-banner').innerHTML = renderHealthBanner();

  // Render KPI grid
  document.getElementById('kpi-grid').innerHTML = renderKPIGrid();

  // Render tabs
  document.getElementById('tabs-bar').innerHTML = renderTabs();

  // Render tab content
  let content = '';
  switch (state.activeTab) {
    case 'overview':
      content = renderOverview();
      break;
    case 'ranking':
      content = renderRanking();
      break;
    case 'teses':
      content = renderTeses();
      break;
    case 'carteiras':
      content = renderCarteiras();
      break;
    case 'pnl':
      content = renderPnLTab();
      break;
    case 'backtests':
      content = renderBacktests();
      break;
    case 'capital':
      content = renderCapital();
      break;
    case 'alertas':
      content = renderAlertas();
      break;
    case 'saude':
      content = renderSaude();
      break;
    case 'historico':
      content = renderHistorico();
      break;
    case 'benchmark':
      content = renderBenchmark();
      break;
    default:
      content = renderOverview();
  }
  document.getElementById('tab-content').innerHTML = content;

  // Update last refresh
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('last-refresh').textContent = `${h}:${m}`;
}

// ─── Controls ────────────────────────────────────────────────
function refresh() {
  fetchAll();
}

function toggleAuto() {
  state.autoRefresh = !state.autoRefresh;
  const btn = document.getElementById('auto-btn');
  if (state.autoRefresh) {
    btn.classList.add('btn-active');
    autoInterval = setInterval(fetchAll, 30000);
  } else {
    btn.classList.remove('btn-active');
    if (autoInterval) clearInterval(autoInterval);
  }
}

function showAssetDetail(ticker) {
  console.log('Asset detail:', ticker);
  switchTab('ranking');
}

// ─── Init ────────────────────────────────────────────────
setInterval(updateClock, 1000);
fetchAll();
if (state.autoRefresh) {
  autoInterval = setInterval(fetchAll, 30000);
}
</script>
